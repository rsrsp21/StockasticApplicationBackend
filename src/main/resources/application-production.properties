# Stockastic Application Configuration - Production
spring.application.name=stockastic-monolith

# Database Configuration (Supabase/Render)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stockastic_db?currentSchema=public}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA/Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=false
management.health.db.enabled=true

# File Upload Configuration (use persistent disk or object storage in production)
file.upload-dir=${FILE_UPLOAD_DIR:/app/uploads/profiles}
file.upload-kyc=${FILE_UPLOAD_KYC:/app/uploads/kyc}
file.upload-stocks=${FILE_UPLOAD_STOCKS:/app/uploads/stocks}

# Max file size
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
jwt.secret=${JWT_SECRET:47dfd8b5103cb5eef036521c2b787297cf1c389ad26521a051cad957b92092b3db3ecc4235e72261292898c4cdf2db86}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:86400000}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.tomcat.max-threads=200
server.tomcat.accept-count=100

# Eureka Client Configuration (disabled in production)
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
eureka.client.service-url.defaultZone=${EUREKA_SERVICE_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=${EUREKA_CLIENT_ENABLED:false}
eureka.client.fetch-registry=${EUREKA_CLIENT_ENABLED:false}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# Yahoo Finance API Configuration
yahoo.finance.api.url=https://query1.finance.yahoo.com/v8/finance/chart/
yahoo.finance.api.timeout=10

# Groww API Configuration (fallback price source for Yahoo Finance)
groww.api.base-url=https://groww.in
groww.api.timeout-seconds=10
marketdata.groww.fallback.enabled=${GROWW_FALLBACK_ENABLED:false}
marketdata.groww.debug-symbol=${GROWW_DEBUG_SYMBOL:}

# Market AI (Google Gemini) Configuration
app.market-ai.default-model=${GEMINI_MODEL:gemini-2.5-flash-lite}
app.market-ai.top-movers-limit=5
app.market-ai.latest-prices-limit=12
# Chat model is disabled by default so the app boots without a Gemini key.
# To enable real AI narratives, set SPRING_AI_CHAT_MODEL=google-genai and GOOGLE_API_KEY.
spring.ai.model.chat=${SPRING_AI_CHAT_MODEL:none}
spring.ai.google.genai.api-key=${GOOGLE_API_KEY:${GEMINI_API_KEY:}}
spring.ai.google.genai.chat.options.model=${GEMINI_MODEL:gemini-2.5-flash-lite}

# Stock Price Scheduler Configuration
# Fetch prices every 5 minutes (cron: second minute hour day month weekday)
stockprice.scheduler.fetch-cron=${STOCKPRICE_FETCH_CRON:0 */5 * * * *}
# Cleanup old prices daily at 2 AM
stockprice.scheduler.cleanup-cron=${STOCKPRICE_CLEANUP_CRON:0 0 2 * * *}
# Number of days to keep price history
stockprice.cleanup.days-to-keep=${STOCKPRICE_CLEANUP_DAYS:30}

# Threading Configuration
spring.threads.virtual.enabled=true
stockprice.initializer.parallelism=6
app.async.core-pool-size=4
app.async.max-pool-size=12
app.async.queue-capacity=500
app.async.activity-log.core-pool-size=2
app.async.activity-log.max-pool-size=4
app.async.activity-log.queue-capacity=1000

# Live quote WebSocket configuration
stockprice.live-update.interval-ms=3000

# CORS Configuration (allow frontend domain)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://your-frontend-domain.vercel.app}
